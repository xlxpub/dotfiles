# 必须加，v2 强制要求
version: 2

# 运行配置
run:
  timeout: 5m
  concurrency: 4
  tests: true
  skip-dirs:
    - vendor
    - node_modules
    - dist
    - build
  skip-files:
    - \.pb\.go$
    - \.gen\.go$
    - _mock\.go$
    - wire_gen\.go$

# 输出格式
output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

# ------------------------------
# golangci-lint v2 正确写法！
# formatters 是 map，不是数组！
# ------------------------------
formatters:
  gofmt: true
  goimports: true

# 启用的 linter
linters:
  disable-all: true
  enable:
    - errcheck
    - staticcheck
    - unused
    - govet
    - goconst
    - gocyclo
    - dupl
    - unparam
    - misspell
    - whitespace
    - nakedret
    - prealloc

# 各 linter 细节设置
linters-settings:
  gocyclo:
    min-complexity: 15
  dupl:
    min-lines: 12
  goconst:
    min-len: 3
    min-occurrences: 3

# 忽略规则
issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - dupl
        - unparam
